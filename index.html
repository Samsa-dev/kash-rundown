<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KASH RUNDOWN</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #0F0F1E; }
  #intro-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #0F0F1E;
    display: flex; align-items: center; justify-content: center;
  }
  #intro-screen.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s; }
  #intro-video { max-width: 100%; max-height: 100%; object-fit: contain; }
  #intro-loading {
    position: absolute; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0; transition: opacity 0.5s;
  }
  #intro-loading.visible { opacity: 1; }
  #intro-loading-text {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #505064; letter-spacing: 1px;
  }
  #intro-loading-bar-wrap {
    width: 160px; height: 3px;
    background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  }
  #intro-loading-bar {
    width: 0%; height: 100%;
    background: linear-gradient(90deg, #EAB308, #EA580C);
    border-radius: 2px; transition: width 0.3s;
  }
  #intro-skip {
    position: absolute; top: 20px; right: 20px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: 2px; color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; padding: 8px 16px;
    cursor: pointer; opacity: 0; transition: opacity 0.5s;
    z-index: 10;
  }
  #intro-skip.visible { opacity: 1; }
  #intro-skip:hover { color: #EAB308; border-color: rgba(234,179,8,0.4); background: rgba(234,179,8,0.1); }
  #wrap { visibility: hidden; }
</style>
</head>
<body>
<!-- Intro video screen -->
<div id="intro-screen">
  <video id="intro-video" playsinline preload="auto">
    <source src="/assets/kash-intro.webm" type="video/webm">
    <source src="/assets/kash-intro.mp4" type="video/mp4">
  </video>
  <div id="intro-loading" class="visible">
    <div id="intro-loading-bar-wrap"><div id="intro-loading-bar"></div></div>
    <div id="intro-loading-text">Loading...</div>
  </div>
  <div id="intro-skip">Skip intro &gt;&gt;</div>
</div>

<div id="wrap">
  <div id="pixi-container"></div>

  <!-- Screen flash overlay -->
  <div id="screen-flash"></div>

  <!-- Crash display -->
  <div id="crash-display">CRASHED</div>

  <!-- Phase event banner -->
  <div id="phase-event-banner"><div class="event-banner-inner" id="banner-text"></div></div>

  <!-- UI overlay -->
  <div id="ui">
    <!-- Top bar -->
    <div id="top-bar">
      <div id="logo">KASH RUNDOWN</div>
      <div id="balance-display">$<span id="bal-num">1,000.00</span></div>
      <button id="mute-btn" title="Toggle sound">🔊</button>
    </div>


    <!-- Stats row -->
    <div id="stats-row">
      <div class="stat-card stat-purple">
        <span class="stat-label">Best Run</span>
        <span class="stat-value" id="best-run">—</span>
      </div>
      <div class="stat-card stat-green">
        <span class="stat-label">Bets</span>
        <span class="stat-value" id="total-bets">—</span>
      </div>
      <div class="stat-card stat-orange">
        <span class="stat-label">Rounds</span>
        <span class="stat-value" id="round-count">0</span>
      </div>
    </div>

    <!-- Multiplier center -->
    <div id="mult-area">
      <div id="multiplier-display">1.00×</div>
      <div id="profit-display">▲ +$0.00</div>
    </div>

    <!-- Kash quote -->
    <div id="kash-quote"></div>

    <div id="mid"></div>

    <!-- Bottom section -->
    <div id="bottom-section">
      <div id="history-row">
        <div id="round-status"></div>
        <div id="history-strip"></div>
      </div>

      <!-- Bet area (IDLE) -->
      <div id="bet-area">
        <div id="bet-row">
          <button class="bet-adj" id="bet-half">½</button>
          <button class="bet-adj" id="bet-minus">−</button>
          <input id="bet-input" type="text" value="10.00" inputmode="decimal" readonly>
          <button class="bet-adj" id="bet-plus">+</button>
          <button class="bet-adj" id="bet-double">×2</button>
        </div>
        <div id="quick-bets">
          <button class="qbet" data-amount="min">MIN</button>
          <button class="qbet" data-amount="10">+$10</button>
          <button class="qbet" data-amount="50">+$50</button>
          <button class="qbet" data-amount="100">+$100</button>
          <button class="qbet" data-amount="max">MAX</button>
        </div>
        <div id="auto-row">
          <span id="auto-label">Auto Cash-Out</span>
          <span id="auto-target-val">OFF</span>
          <input id="auto-slider" type="range" min="0" max="100" value="0" step="1">
        </div>
        <button id="place-bet-btn">PLACE BET — $<span id="btn-bet-amount">10.00</span></button>
      </div>

    </div>
  </div>

  <!-- Countdown overlay -->
  <div id="countdown-overlay">
    <div id="countdown-num">5</div>
    <div id="countdown-label">ROUND STARTS IN</div>
  </div>

  <!-- Bust screen -->
  <div id="bust-screen">
    <div id="bust-over">ROUND OVER</div>
    <div id="bust-title">BUSTED</div>
    <div id="bust-at">Caught at: <span id="bust-mult">3.42×</span></div>
    <div id="bust-quote"></div>
    <div id="bust-card">
      <div class="bust-row"><span class="label">Bet placed</span><span class="val" id="bust-bet-val">$10.00</span></div>
      <div class="bust-row"><span class="label">Crash point</span><span class="val red" id="bust-crash-val">3.42×</span></div>
      <div class="bust-row"><span class="label">Result</span><span class="val red" id="bust-result-val">-$10.00</span></div>
    </div>
    <div id="bust-actions">
      <button id="run-again">▶ RUN IT BACK</button>
    </div>
  </div>

  <!-- Win screen -->
  <div id="win-screen">
    <div id="win-title">🏆 ESCAPED!</div>
    <div id="win-amount">$0.00</div>
    <div id="win-mult">Cash out at <span id="win-mult-val">1.00×</span></div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
